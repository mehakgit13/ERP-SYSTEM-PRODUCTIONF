services:
  - type: web
    name: nexuserp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false          # set to your Vercel URL
